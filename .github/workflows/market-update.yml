name: Market Update

on:
  # schedule:
  #   - cron: "0 2 * * 0" # 02:00 UTC Sundays — disabled pending testing
  workflow_dispatch:

concurrency:
  group: taimi-market-update
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v6

      - name: Check for existing market-update PR
        id: check-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          open_prs=$(gh pr list --label market-update --state open --json number --jq 'length')
          if [ "$open_prs" -gt 0 ]; then
            echo "::notice::Open market-update PR exists. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set date
        if: ${{ !steps.check-pr.outputs.skip }}
        run: echo "DATE=$(date -u +%Y-%m-%d)" >> "$GITHUB_ENV"

      - name: Create update branch
        if: ${{ !steps.check-pr.outputs.skip }}
        run: |
          git checkout -B "market-update/${{ env.DATE }}"
          echo "BRANCH=market-update/${{ env.DATE }}" >> "$GITHUB_ENV"

      - name: Run Claude Code agent
        if: ${{ !steps.check-pr.outputs.skip }}
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          show_full_output: true
          prompt: |
            Today is ${{ env.DATE }}.
            Read docs/market-update.md and execute.
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 30
            --max-budget-usd 5
            --allowedTools "Read,Edit,Write,Glob,Grep,WebSearch,WebFetch,Bash(jq *),Bash(ls *),Bash(bash scripts/*),Bash(bash ./scripts/*)"
            --disallowedTools "Bash(rm *),Bash(curl *),Bash(wget *),Bash(npm *),Bash(pip *),Bash(sudo *)"

      - name: Build
        if: ${{ !steps.check-pr.outputs.skip }}
        run: |
          ./scripts/assemble.sh
          ./scripts/generate-index.sh

      - name: Validate
        if: ${{ !steps.check-pr.outputs.skip }}
        run: ./scripts/validate.sh

      - name: Check for changes
        if: ${{ !steps.check-pr.outputs.skip }}
        id: changes
        run: |
          git add data/ public/
          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No changes detected. Skipping PR."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: ${{ !steps.check-pr.outputs.skip && steps.changes.outputs.has_changes == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: market update ${{ env.DATE }}"
          git push -u origin "$BRANCH"

      - name: Create pull request
        if: ${{ !steps.check-pr.outputs.skip && steps.changes.outputs.has_changes == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "Market update ${{ env.DATE }}" \
            --label "market-update" \
            --body "$(cat <<'EOF'
          ## Market Update

          Created by the weekly market-update workflow running Claude Code agent against [market-update.md](docs/market-update.md).

          ### Review checklist
          - [ ] New tools meet inclusion criteria (3+ search hits, 30+ days public, public pricing)
          - [ ] Removed/archived tools confirmed against official sources
          - [ ] Observations in `data/observations.html` are factually correct
          - [ ] `changelog.json` has entries for all changes
          - [ ] `validate.sh` passed (check Actions log)

          ### Cost
          Check the Claude Code step log for actual token usage.

          ---
          Generated by [Claude Code](https://claude.com/claude-code) via GitHub Actions
          EOF
          )"
