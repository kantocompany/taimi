name: Price Update

on:
  # schedule:
  #   - cron: "0 5 * * *" # 05:00 UTC daily — disabled pending testing
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  # ── Job 1: Setup ────────────────────────────────────────────────
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.tools.outputs.matrix }}
      date: ${{ steps.date.outputs.date }}
      skip: ${{ steps.check-pr.outputs.skip }}
    steps:
      - uses: actions/checkout@v6

      - name: Check for existing price-update PR
        id: check-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          open_prs=$(gh pr list --label price-update --state open --json number --jq 'length')
          if [ "$open_prs" -gt 0 ]; then
            echo "::notice::Open price-update PR exists. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set date
        if: ${{ !steps.check-pr.outputs.skip }}
        id: date
        run: echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Discover tools
        if: ${{ !steps.check-pr.outputs.skip }}
        id: tools
        run: |
          matrix=$(ls data/tools/*.json | xargs -I{} basename {} .json | jq -R -s -c 'split("\n") | map(select(. != ""))')
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "::notice::Tools to verify: $matrix"

  # ── Job 2: Verify (four-phase pipeline per tool, parallel) ─────
  verify:
    needs: setup
    if: ${{ !needs.setup.outputs.skip }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        tool: ${{ fromJson(needs.setup.outputs.matrix) }}
      fail-fast: false
    env:
      DATE: ${{ needs.setup.outputs.date }}
    steps:
      - uses: actions/checkout@v6

      - name: Create working directories
        run: mkdir -p findings diff-results validated

      # ── Phase 1: Research (AI — no Edit permission) ──────────────
      - name: Research ${{ matrix.tool }}
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          show_full_output: true
          prompt: |
            Today is ${{ env.DATE }}. Tool: ${{ matrix.tool }}.
            Read docs/price-update.md and execute.
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 18  # research-max-turns
            --max-budget-usd 0.50
            --allowedTools "Read,Write,Glob,Grep,WebSearch,WebFetch,Bash(jq *)"
            --disallowedTools "Agent,Edit"

      # Safety: restore data file if agent wrote to it despite instructions
      - name: Restore data file
        run: git checkout -- data/tools/${{ matrix.tool }}.json 2>/dev/null || true

      # ── Phase 2: Deterministic diff ──────────────────────────────
      - name: Diff findings
        id: diff
        run: |
          if [[ ! -f findings/${{ matrix.tool }}.json ]]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No findings file for ${{ matrix.tool }} — agent may have failed"
            exit 0
          fi
          if ! jq empty findings/${{ matrix.tool }}.json 2>/dev/null; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Invalid findings JSON for ${{ matrix.tool }}"
            exit 0
          fi
          result=$(./scripts/diff-findings.sh \
            findings/${{ matrix.tool }}.json \
            data/tools/${{ matrix.tool }}.json)
          has_changes=$(echo "$result" | jq -r '.has_changes')
          echo "has_changes=$has_changes" >> "$GITHUB_OUTPUT"
          echo "$result" > diff-results/${{ matrix.tool }}.json
          if [[ "$has_changes" == "true" ]]; then
            echo "changes=$(echo "$result" | jq -c '.changes')" >> "$GITHUB_OUTPUT"
            echo "source_url=$(echo "$result" | jq -r '.source_url')" >> "$GITHUB_OUTPUT"
            echo "::notice::${{ matrix.tool }}: price changes detected"
            echo "$result" | jq -r '.changes[] | "  \(.plan_id) \(.field): \(.old) → \(.new)"'
          else
            status=$(echo "$result" | jq -r '.status // "verified"')
            echo "::notice::${{ matrix.tool }}: $status — no changes"
          fi

      # ── Phase 3: Conditional validation (clean slate) ────────────
      # Verdict schema: schemas/verdict.json (inline here because agent has no Read permission)
      - name: Validate ${{ matrix.tool }}
        if: steps.diff.outputs.has_changes == 'true'
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          show_full_output: true
          prompt: |
            Price verification for ${{ matrix.tool }}.

            A research agent reports these price changes:
            ${{ steps.diff.outputs.changes }}

            Source URL: ${{ steps.diff.outputs.source_url }}

            Your task: independently verify each change.
            IMPORTANT: Verify ONLY the specific changes listed above. Do not check other fields or report changes you notice independently on the page.
            1. Fetch the source URL above
            2. For each change, confirm the NEW value appears on the page
            3. Write your verdict to validated/${{ matrix.tool }}.json with this schema:
            {
              "slug": "${{ matrix.tool }}",
              "changes": [
                { "plan_id": "...", "field": "...", "old": ..., "new": ..., "confirmed": true, "evidence": "quoted text from page" }
              ]
            }
            If you cannot fetch the page or find the price, set confirmed to false.
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 8  # validate-max-turns
            --max-budget-usd 0.15
            --allowedTools "Write,WebSearch,WebFetch"
            --disallowedTools "Agent,Edit,Read,Bash,Glob,Grep"

      # ── Phase 4: Deterministic apply ─────────────────────────────
      - name: Apply changes
        if: steps.diff.outputs.has_changes == 'true'
        run: |
          if [[ -f validated/${{ matrix.tool }}.json ]] && jq empty validated/${{ matrix.tool }}.json 2>/dev/null; then
            ./scripts/apply-findings.sh \
              validated/${{ matrix.tool }}.json \
              data/tools/${{ matrix.tool }}.json
          else
            echo "::warning::No valid verdict for ${{ matrix.tool }} — skipping apply"
          fi

      - name: Upload tool file
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tool-${{ matrix.tool }}
          path: data/tools/${{ matrix.tool }}.json

      - name: Upload findings
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: findings-${{ matrix.tool }}
          path: |
            findings/${{ matrix.tool }}.json
            diff-results/${{ matrix.tool }}.json
            validated/${{ matrix.tool }}.json

  # ── Job 3: Finalize ─────────────────────────────────────────────
  finalize:
    needs: [setup, verify]
    if: ${{ always() && !needs.setup.outputs.skip && !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DATE: ${{ needs.setup.outputs.date }}
    steps:
      - uses: actions/checkout@v6

      - name: Download tool artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: tool-*
          path: artifacts/tools/

      - name: Generate changelog from diffs
        run: |
          entries=()
          for dir in artifacts/tools/tool-*; do
            tool=$(basename "$dir" | sed 's/^tool-//')
            entry=$(./scripts/generate-changelog-entry.sh \
              "data/tools/$tool.json" \
              "$dir/$tool.json" \
              "$tool" "$DATE" || true)
            if [[ -n "$entry" ]]; then
              entries+=("$entry")
              echo "  changelog: $tool"
            fi
          done
          if [[ ${#entries[@]} -gt 0 ]]; then
            new_json=$(printf '%s\n' "${entries[@]}" | jq -s '.')
            jq --argjson new "$new_json" \
              '.changes = ($new + .changes) | .meta.updated_at = (now | strftime("%Y-%m-%dT%H:%M:%SZ")) | .meta.version = (now | strftime("%Y-%m-%d"))' \
              public/v1/changelog.json > tmp_changelog.json
            mv tmp_changelog.json public/v1/changelog.json
            echo "Generated ${#entries[@]} changelog entries"
          else
            echo "No price changes detected"
          fi

      - name: Apply updated tool files
        run: |
          for dir in artifacts/tools/tool-*; do
            tool=$(basename "$dir" | sed 's/^tool-//')
            cp "$dir/$tool.json" data/tools/
          done

      - name: Build
        run: |
          ASSEMBLE_DATE=${{ env.DATE }} ./scripts/assemble.sh
          ./scripts/generate-index.sh

      - name: Validate
        run: ./scripts/validate.sh

      - name: Check for changes
        id: changes
        run: |
          git add data/ public/
          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No changes detected. Skipping PR."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            git diff --cached --stat
          fi

      - name: Commit and push
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          BRANCH="price-update/${{ env.DATE }}"
          git checkout -B "$BRANCH"
          git commit -m "chore: automated price update ${{ env.DATE }}"
          git push -u origin "$BRANCH"

      - name: Create pull request
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "Price update ${{ env.DATE }}" \
            --label "price-update" \
            --body "$(cat <<'EOF'
          ## Price Update

          Created by the daily price-update workflow. Four-phase pipeline per tool:
          1. **Research** — Claude Code agent extracts prices (no edit permission)
          2. **Diff** — deterministic jq comparison of findings vs current data
          3. **Validate** — clean-slate agent independently verifies detected changes
          4. **Apply** — deterministic jq update of confirmed changes only

          ### Review checklist
          - [ ] Price changes verified against vendor pricing pages
          - [ ] `changelog.json` has entries with source URLs
          - [ ] `validate.sh` passed (check Actions log)
          - [ ] No UNVERIFIED markers left unaddressed
          - [ ] Check findings artifacts for extraction details

          ### Cost
          Check individual matrix job logs for per-tool token usage.

          ---
          Generated by [Claude Code](https://claude.com/claude-code) via GitHub Actions
          EOF
          )"
