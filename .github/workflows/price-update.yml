name: Price Update

on:
  schedule:
    - cron: "0 5 * * *" # 05:00 UTC daily
  workflow_dispatch:

concurrency:
  group: taimi-price-update
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - name: Check for existing price-update PR
        id: check-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          open_prs=$(gh pr list --label price-update --state open --json number --jq 'length')
          if [ "$open_prs" -gt 0 ]; then
            echo "::notice::Open price-update PR exists. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set date
        if: ${{ !steps.check-pr.outputs.skip }}
        run: echo "DATE=$(date -u +%Y-%m-%d)" >> "$GITHUB_ENV"

      - name: Create update branch
        if: ${{ !steps.check-pr.outputs.skip }}
        run: |
          git checkout -B "price-update/${{ env.DATE }}"
          echo "BRANCH=price-update/${{ env.DATE }}" >> "$GITHUB_ENV"

      - name: Run Claude Code agent
        if: ${{ !steps.check-pr.outputs.skip }}
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          show_full_output: true
          prompt: |
            Today is ${{ env.DATE }}. Read docs/price-update.md and execute the price verification process for all vendors. Do not commit or push — the workflow handles git operations.
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 25
            --max-budget-usd 3
            --allowedTools "Read,Edit,Write,Glob,Grep,WebSearch,WebFetch,Bash(./scripts/*),Bash(jq *),Bash(git diff *),Bash(git status),Bash(git log *)"
            --disallowedTools "Bash(rm *),Bash(curl *),Bash(wget *),Bash(npm *),Bash(pip *),Bash(sudo *)"

      - name: Post-agent validation
        if: ${{ !steps.check-pr.outputs.skip }}
        run: |
          ./scripts/generate-tool-files.sh
          ./scripts/validate.sh

      - name: Check for changes
        if: ${{ !steps.check-pr.outputs.skip }}
        id: changes
        run: |
          git add public/
          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No changes in public/. Skipping PR."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: ${{ !steps.check-pr.outputs.skip && steps.changes.outputs.has_changes == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: automated price update ${{ env.DATE }}"
          git push -u origin "$BRANCH"

      - name: Create pull request
        if: ${{ !steps.check-pr.outputs.skip && steps.changes.outputs.has_changes == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "Price update ${{ env.DATE }}" \
            --label "price-update" \
            --body "## Price Update

          Created by the daily price-update workflow running Claude Code agent against [price-update.md](docs/price-update.md).

          ### Review checklist
          - [ ] Only \`public/\` files changed
          - [ ] \`changelog.json\` has entries with source URLs
          - [ ] Price changes verified against vendor pricing pages
          - [ ] \`validate.sh\` passed (check Actions log)
          - [ ] No UNVERIFIED markers left unaddressed

          ### Cost
          Check the Claude Code step log for actual token usage.

          ---
          Generated by [Claude Code](https://claude.com/claude-code) via GitHub Actions"
