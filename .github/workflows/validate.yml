name: Validate Data

on:
  pull_request:
    branches: [main]
    paths:
      - "data/**"
      - "public/v1/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build from source
        run: |
          ./scripts/assemble.sh
          ./scripts/generate-index.sh

      - name: Check for drift
        run: |
          if ! git diff --quiet public/; then
            echo "::error::Generated files are out of sync with source data"
            git diff --stat public/
            exit 1
          fi

      - name: Run validation
        run: ./scripts/validate.sh

      - name: Comment on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --body "## Validation Failed

          Check the Actions log for details. Common fixes:
          - Run \`./scripts/assemble.sh && ./scripts/generate-index.sh\` to regenerate from source
          - Check that \`data/tools/*.json\` files have valid JSON with required fields
          - Ensure \`changelog.json\` is valid JSON
          - Verify all tools have \`pricing_url\` set"
